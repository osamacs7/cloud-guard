name: cis-k8s-1.8
version: "1.8.0"
description: CIS Kubernetes Benchmark v1.8.0
controls:
  - id: "CIS K8s 5.1.5"
    title: "Ensure default service accounts are not actively used"
    severity: medium
    section: "5.1 RBAC and Service Accounts"

  - id: "CIS K8s 5.2.1"
    title: "Ensure privileged containers are not used"
    severity: critical
    section: "5.2 Pod Security Standards"

  - id: "CIS K8s 5.2.2"
    title: "Ensure containers do not share host namespaces"
    severity: high
    section: "5.2 Pod Security Standards"

  - id: "CIS K8s 5.2.6"
    title: "Ensure containers run as non-root"
    severity: high
    section: "5.2 Pod Security Standards"

  - id: "CIS K8s 5.3.2"
    title: "Ensure network policies are defined for all namespaces"
    severity: medium
    section: "5.3 Network Policies"

  - id: "CIS K8s 5.4.1"
    title: "Ensure resource limits are set for containers"
    severity: medium
    section: "5.4 General Policies"
