replicaCount: 2

image:
  repository: cloud-guard
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: cloudguard.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: cloudguard-tls
      hosts:
        - cloudguard.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

postgresql:
  enabled: true
  auth:
    database: cloudguard
    username: cloudguard

redis:
  enabled: true
  architecture: standalone

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
